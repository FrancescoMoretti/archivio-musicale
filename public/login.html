<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./stile/stile.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="scripts/login_script.js" defer></script>
    <title>Login</title>
</head>

<body>
    <header>
        <nav>
            <input type="checkbox" id="menu-toggle">
            <label for="menu-toggle" id="menu-icon">&#9776;</label>
            <ul id="menu">
                <li><a href="/index.html">Home</a></li>
                <li><a href="/catalogo.html">Catalogo</a></li>
                <li id="logo"><a href="/index.html"><img src="immagini/logo_archivio_piccolo.webp" alt="Logo archivio musicale"></a></li>
                <li><a href="#">Biografia</a></li>
                <li><a href="#">Trovaci</a></li>
            </ul>
        </nav>
    </header>
    <main id="login">
        <h1>Accedi</h1>
        <form id="login-form" action="/api/login" method="POST">
            <p><!--messaggio--></p>
            <div>
                <label for="email">Email: </label>
                <input type="email" id="email" name="email" placeholder="mario.rossi@mail.it" required>
            </div>
            <div>
                <label for="password">Password: </label>
                <input type="password" id="password" name="password" placeholder="password" required>
                <span id="icona-occhio-aperto" class="material-symbols-outlined icona">Visibility</span>
                <span id="icona-occhio-chiuso" class="material-symbols-outlined icona">visibility_off</span>
            </div>
            <input type="submit" value="Accedi">
        </form>
    </main>
    <footer>
        <p>&copy; 2025 Archivio musicale Luca Moretti. Tutti i diritti riservati</p>
        <p>Trovaci sui social: <a href="https://www.facebook.com/share/15rkzqvaTg/" target="_blank">Facebook</a></p>
        <address>
            <p><span class="material-symbols-outlined">mail</span>mail</p>
            <p><span class="material-symbols-outlined">call</span>Telefono</p>
        </address>
    </footer>
</body>

</html>
